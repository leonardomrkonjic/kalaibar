<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon_kalai.ico" type="image/x-icon">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.mobile {
  display: none;
}

@media (max-width: 768px) {
  .desktop {
    display: none;
  }

  .mobile {
    display: block;
  }
}
</style>
</head>

<body>

<video class="desktop" autoplay muted loop playsinline>
  <source src="desktop.mp4" type="video/mp4">
</video>

<video class="mobile" autoplay muted loop playsinline>
  <source src="mobile.mp4" type="video/mp4">
</video>

</body>
</html>
